name: flutter_application_1
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.7.0
  cloud_firestore: ^5.6.0
  firebase_messaging: ^15.2.0
  firebase_storage: ^12.4.0

  # Location
  geolocator: ^13.0.2
  geocoding: ^3.0.0
  geoflutterfire_plus: ^0.0.27
  permission_handler: ^11.4.0
  csc_picker_plus: ^0.0.3

  # Notifications
  flutter_local_notifications: ^18.0.1

  # Security
  flutter_secure_storage: ^9.2.4

  # Utilities
  intl: ^0.19.0
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  uuid: ^4.5.1
  webview_flutter: ^4.13.1
  http: ^1.6.0
  crypto: ^3.0.6
  url_launcher: ^6.3.2
  file_picker: ^8.0.0+1
  record: ^7.1.0
  audioplayers: ^6.7.1
  path_provider: ^2.1.5
  phosphoricons_flutter: ^1.0.0

  # Event tickets / QR
  qr_flutter: ^4.1.0
  mobile_scanner: ^6.0.2
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/images/app_logo.png"
  web:
    generate: true
    image_path: "assets/images/app_logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
  fonts:
    - family: PlayfairDisplay
      fonts:
        - asset: assets/fonts/PlayfairDisplay[wght].ttf
        - asset: assets/fonts/PlayfairDisplay-Italic[wght].ttf
          style: italic
        - asset: assets/fonts/PlayfairDisplay-Bold.ttf
          weight: 700

    - family: PlusJakartaSans
      fonts:
        - asset: assets/fonts/PlusJakartaSans-Regular.ttf
        - asset: assets/fonts/PlusJakartaSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/PlusJakartaSans-Bold.ttf
          weight: 700
